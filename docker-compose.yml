services:
  backend:
    build:
      context: ./issue-tracker-backend
      dockerfile: Dockerfile
    ports:
      - "9092:8080"
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/issue_tracker
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-7894}
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started

  frontend:
    build: ./issue-tracker-frontend
    ports:
      - "8085:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
# No volumes needed for local DB
