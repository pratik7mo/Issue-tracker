services:
  backend:
    build:
      context: ./issue-tracker-backend
      dockerfile: Dockerfile
    ports:
      - "9092:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${DB_URL:?DB_URL is required}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:?MAIL_USERNAME is required}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started


  frontend:
    build:
      context: ./issue-tracker-frontend
      args:
        # `/api` = same-origin via Nginx → backend. Override with full URL if API is on another host.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "8085:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
