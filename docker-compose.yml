
services:
  database:
    image: postgres:15
    environment:
      POSTGRES_DB: issue_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-7894}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./issue-tracker-backend
      dockerfile: Dockerfile
    ports:
      - "9092:8080"
    environment:
      DB_URL: jdbc:postgresql://database:5432/issue_tracker
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-7894}
    depends_on:
      - database

  frontend:
    build: ./issue-tracker-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
