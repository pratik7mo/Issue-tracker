services:
  backend:
    build:
      context: ./issue-tracker-backend
      dockerfile: Dockerfile
    ports:
      - "9092:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${DB_URL:?DB_URL is required}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:?MAIL_USERNAME is required}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started


  frontend:
    build:
      context: ./issue-tracker-frontend
      args:
        # Browser calls this URL; must be reachable from the client (not Docker service names).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9092/api}
    ports:
      - "8085:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
# No volumes needed for local DB
