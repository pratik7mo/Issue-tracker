services:
  backend:
    image: ${ECR_REGISTRY}/issue-tracker-backend:latest
    ports:
      - "9092:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  frontend:
    image: ${ECR_REGISTRY}/issue-tracker-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
