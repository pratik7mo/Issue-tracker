spring.application.name=issue-tracker-backend
server.servlet.context-path=/api


# Default Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration (Defaults)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/issue_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:7894}

# Mail Configuration
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Observability Configuration
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# Cache Configuration
spring.cache.type=redis