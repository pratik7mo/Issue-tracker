spring.application.name=issue-tracker-backend
server.port=8080

# Database Configuration (Development)
spring.datasource.url=jdbc:postgresql://localhost:5432/issue_tracker
spring.datasource.username=postgres
spring.datasource.password=7894

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Resilience4j
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.dbService.baseConfig=default
resilience4j.circuitbreaker.instances.dbService.waitDurationInOpenState=10s
# Redis Caching
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Async Processing
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
